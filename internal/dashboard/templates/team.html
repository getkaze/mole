{{define "title"}}team{{end}}

{{define "content"}}
<div class="page-header">
    <h1>team</h1>
    <p>quality distribution and training insights</p>
</div>

<section>
    <h2>mole acceptance rate</h2>
    <div hx-get="/team/acceptance" hx-trigger="load" hx-swap="innerHTML">
        <p>loading...</p>
    </div>
</section>

<section>
    <h2>issue distribution</h2>
    <div hx-get="/team/distribution?period=30d" hx-trigger="load" hx-swap="innerHTML">
        <p>loading...</p>
    </div>
</section>

<section>
    <h2>training suggestions</h2>
    <div hx-get="/team/training" hx-trigger="load" hx-swap="innerHTML">
        <p>loading...</p>
    </div>
</section>
{{end}}
