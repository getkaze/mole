{{if .Streak}}
<div class="streak-display">
    <span class="streak-count">{{.Streak}}</span>
    <div>
        <div style="font-weight:600;font-size:14px;" data-i18n="label.streak">streak</div>
        <div class="streak-label" data-i18n="label.streak-desc">PRs consecutivos sem issues críticos</div>
    </div>
</div>
{{end}}

{{if .Badges}}
<div class="badge-grid">
    {{range .Badges}}
    <div class="achievement-badge">
        <span class="achievement-badge-icon">{{.Icon}}</span>
        <span>{{.Name}}</span>
    </div>
    {{end}}
</div>
{{else}}
<div class="empty-state" style="padding:20px 0;">
    <div class="empty-state-text" data-i18n="empty.no-badges">Continue fazendo reviews para desbloquear badges!</div>
</div>
{{end}}
