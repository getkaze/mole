{{if .Topics}}
<div class="training-list">
    {{range .Topics}}
    <div class="training-item">
        <div>
            <div class="training-name">{{.Category}}</div>
            {{if .Subcategory}}
            <div class="training-sub">{{.Subcategory}}</div>
            {{end}}
        </div>
        <span class="training-count">{{.Count}}x</span>
    </div>
    {{end}}
</div>
{{else}}
<div class="empty-state" style="padding:20px 0;">
    <div class="empty-state-text" data-i18n="empty.no-patterns">Nenhum padrão recorrente detectado ainda.</div>
</div>
{{end}}
