{{if .Weeks}}
<div class="trend-chart">
    {{range .Weeks}}
    <div class="trend-bar-wrap">
        <div class="trend-bar {{.Color}}" style="height:{{.Height}}%"></div>
        <span class="trend-label">{{.Label}}</span>
    </div>
    {{end}}
</div>
{{else}}
<div class="empty-state">
    <div class="empty-state-text" data-i18n="empty.no-trends">Dados insuficientes para exibir tendências.</div>
</div>
{{end}}
