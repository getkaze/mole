{{if .Categories}}
<div class="heatmap">
    {{range .Categories}}
    <div class="heatmap-row">
        <span class="heatmap-label">{{.Name}}</span>
        <div class="heatmap-bar-bg">
            <div class="heatmap-bar-fill" style="width:{{printf "%.0f" .Percent}}%"></div>
        </div>
        <span class="heatmap-count">{{.Count}}</span>
    </div>
    {{end}}
</div>
{{else}}
<div class="empty-state">
    <div class="empty-state-text" data-i18n="empty.no-issues">Nenhuma issue encontrada neste período.</div>
</div>
{{end}}
