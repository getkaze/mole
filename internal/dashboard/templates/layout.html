{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <title>mole — {{template "title" .}}</title>
    <link rel="icon" href="/static/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Recursive:slnt,wght,CASL,MONO@-15..0,300..700,0..1,0..1&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>

    <!-- Topbar -->
    <div class="topbar">
        <a href="/me" class="topbar-logo">
            <img src="/static/mole.png" alt="mole" class="topbar-logo-icon">
            <span class="topbar-wordmark">mole</span>
        </a>

        <div class="topbar-sep"></div>

        <div class="topbar-right">
            <button class="topbar-btn" onclick="toggleTheme()" title="Toggle theme">
                <svg id="theme-icon-sun" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                <svg id="theme-icon-moon" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
            </button>

            {{if .User}}
            <div class="topbar-user">
                <span>{{.User}}</span>
                <a href="/auth/logout">logout</a>
            </div>
            {{end}}
        </div>
    </div>

    <!-- Layout: sidebar + main -->
    <div class="layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-label">navigation</div>
                <a href="/me" class="sidebar-item{{if eq .Page "me"}} active{{end}}">
                    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M5.338 18.322C6.093 15.753 8.427 14 11.075 14h1.85c2.648 0 4.982 1.753 5.737 4.322"/></svg>
                    Dashboard
                </a>
                <a href="/developers" class="sidebar-item{{if eq .Page "developers"}} active{{end}}">
                    <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4-4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                    Developers
                </a>
                <a href="/team" class="sidebar-item{{if eq .Page "team"}} active{{end}}">
                    <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    Team
                </a>
                <a href="/modules" class="sidebar-item{{if eq .Page "modules"}} active{{end}}">
                    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                    Modules
                </a>
            </div>

            <div class="sidebar-footer">
                <div class="sidebar-version">mole</div>
            </div>
        </aside>

        <!-- Main content -->
        <div class="main">
            <div class="page-body">
                {{template "content" .}}
            </div>
        </div>

    </div>

    <script>
    function toggleTheme() {
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('mole-theme', next);
        updateThemeIcons(next);
    }

    function updateThemeIcons(theme) {
        var sun = document.getElementById('theme-icon-sun');
        var moon = document.getElementById('theme-icon-moon');
        if (theme === 'light') {
            sun.style.display = 'block';
            moon.style.display = 'none';
        } else {
            sun.style.display = 'none';
            moon.style.display = 'block';
        }
    }

    (function() {
        var saved = localStorage.getItem('mole-theme');
        if (saved) {
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeIcons(saved);
        }
    })();
    </script>
</body>
</html>
{{end}}
